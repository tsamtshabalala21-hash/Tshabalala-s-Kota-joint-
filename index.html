<!DOCTYPE html>
<html>
<head>
<title>Tshabalala's Kota Joint</title>

<style>
body{
font-family: Arial;
background:#f7f7f7;
margin:0;
}

header{
background:#c40000;
color:white;
padding:20px;
text-align:center;
}

.menu{
padding:20px;
}

.menu-item{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
margin-bottom:10px;
border-radius:5px;
}

button{
background:#ff9900;
border:none;
padding:8px 12px;
cursor:pointer;
}

.order{
background:white;
padding:20px;
margin:20px;
}

</style>
</head>

<body>

<header>
<h1>Tshabalala's Kota Joint</h1>
<p>Open Daily 06:00 – 21:00</p>
</header>

<div class="menu">

<h2>Kota Menu</h2>

<div class="menu-item">
<span>Chips + French</span>
<span>R17 <button onclick="add('Chips + French',17)">Order</button></span>
</div>

<div class="menu-item">
<span>French + Vienna</span>
<span>R20 <button onclick="add('French + Vienna',20)">Order</button></span>
</div>

<div class="menu-item">
<span>French + Burger</span>
<span>R20 <button onclick="add('French + Burger',20)">Order</button></span>
</div>

<div class="menu-item">
<span>French + Cheese</span>
<span>R23 <button onclick="add('French + Cheese',23)">Order</button></span>
</div>

<div class="menu-item">
<span>French + Egg</span>
<span>R25 <button onclick="add('French + Egg',25)">Order</button></span>
</div>

<div class="menu-item">
<span>French + Vienna + Cheese</span>
<span>R25 <button onclick="add('French + Vienna + Cheese',25)">Order</button></span>
</div>

</div>

<div class="order">

<h2>Your Order</h2>

<ul id="cart"></ul>

<p>Total: R<span id="total">0</span></p>

<button onclick="pay()">Pay Now</button>

</div>

<script>

let total = 0

function add(item,price){

let li = document.createElement("li")
li.innerText = item + " - R" + price

document.getElementById("cart").appendChild(li)

total += price

document.getElementById("total").innerText = total

}

function pay(){

alert("Payment integration coming soon")

}

</script>

</body>
</html>
